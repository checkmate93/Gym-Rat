<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💪 Gym Tracker PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f0f2f5; padding-bottom: 100px; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; position: sticky; top: 0; z-index: 100; text-align: center; }
        .stopwatch { position: fixed; top: 80px; right: 10px; background: #000; color: #0f0; padding: 8px 12px; border-radius: 8px; font-family: monospace; z-index: 99; display: flex; align-items: center; gap: 5px; }
        .muscle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .muscle-btn { background: white; border: 2px solid #ddd; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .muscle-btn.selected { background: #667eea; color: white; border-color: #667eea; }
        .exercise-card { background: white; border-radius: 15px; padding: 15px; margin: 10px 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .ex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .set-row { display: grid; grid-template-columns: 0.5fr 1fr 1fr 0.3fr; gap: 5px; margin-bottom: 5px; align-items: center; }
        .set-row input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-size: 16px; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-sml { flex: 1; padding: 8px; border: none; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-add { background: #e3f2fd; color: #1976d2; }
        .btn-rem { background: #ffebee; color: #c62828; }
        .btn-lock { background: #e8f5e9; color: #2e7d32; }
        .btn-lock.active { background: #2e7d32; color: white; }
        .save-btn { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 10px; width: calc(100% - 30px); margin: 15px; font-weight: bold; font-size: 18px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 60px; }
        .nav-btn { flex: 1; border: none; background: none; font-weight: bold; color: #666; }
        .nav-btn.active { color: #667eea; border-top: 3px solid #667eea; }
        .history-card { background: white; margin: 10px; padding: 15px; border-radius: 10px; border-left: 5px solid #667eea; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Gym Tracker PRO</h2>
    </div>

    <div class="stopwatch">
        <span id="timer-val">00:00:00</span>
        <button onclick="toggleT()" id="t-btn" style="background:#0f0; border:none; padding:2px 5px; border-radius:3px;">▶</button>
    </div>

    <div id="screen-work">
        <div class="muscle-grid" id="m-grid"></div>
        <div id="ex-list"></div>
        <button class="save-btn" onclick="saveW()" id="sv-btn" style="display:none;">✅ ΑΠΟΘΗΚΕΥΣΗ ΠΡΟΠΟΝΗΣΗΣ</button>
    </div>

    <div id="screen-hist" class="hidden">
        <div id="hist-list" style="padding-top:10px;"></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="tab('work')">🏋️ Workout</button>
        <button class="nav-btn" onclick="tab('hist')">📊 History</button>
        <button class="nav-btn" onclick="clearData()" style="color:red">🗑️ Reset</button>
    </div>

    <script>
        const GROUPS = {
            'Ώμοι': ['Πιέσεις ώμων', 'Εκτάσεις', 'Arnold Press', 'Πίσω μοίρα'],
            'Στήθος': ['Επικλινής πάγκος', 'Ίσιος πάγκος (μπάρα)', 'Flyes', 'Peck Deck'],
            'Πλάτη': ['Έλξεις', 'Κωπηλατική'],
            'Τρικέφαλα': ['Εκτάσεις σε σχοινί', 'Κανονικές εκτάσεις', 'Γαλλικές πιέσεις', 'Βυθίσεις'],
            'Δικέφαλα': [], 'Πόδια': [], 'CrossFit': [], 'Περπάτημα': []
        };

        let activeGroups = [];
        let workoutData = {}; // Stores sets for each exercise
        let walkMin = 0;
        let sec = 0, timerObj = null, isT = false;

        function init() {
            const grid = document.getElementById('m-grid');
            Object.keys(GROUPS).forEach(g => {
                const b = document.createElement('button');
                b.className = 'muscle-btn';
                b.innerText = g;
                b.onclick = () => toggleG(g, b);
                grid.appendChild(b);
            });
            loadH();
        }

        function toggleG(g, b) {
            if (activeGroups.includes(g)) activeGroups = activeGroups.filter(x => x !== g);
            else activeGroups.push(g);
            b.classList.toggle('selected');
            renderEx();
        }

        function renderEx() {
            const cont = document.getElementById('ex-list');
            cont.innerHTML = '';
            document.getElementById('sv-btn').style.display = activeGroups.length > 0 ? 'block' : 'none';

            activeGroups.forEach(g => {
                const card = document.createElement('div');
                card.className = 'exercise-card';
                if (g === 'Περπάτημα') {
                    card.innerHTML = `<h3>🚶 Περπάτημα</h3><input type="number" placeholder="Λεπτά" oninput="walkMin=this.value" style="width:100%; padding:10px; margin-top:10px; border-radius:8px; border:1px solid #ccc;">`;
                } else {
                    card.innerHTML = `<h3>${g}</h3><div id="exs-${g}"></div>
                    <div style="margin-top:10px; display:flex; gap:5px;">
                        <input type="text" id="in-${g}" placeholder="Νέα άσκηση..." style="flex:1; padding:8px; border-radius:5px; border:1px solid #ccc;">
                        <button onclick="addEx('${g}')" style="padding:8px; background:#667eea; color:white; border:none; border-radius:5px;">+</button>
                    </div>`;
                    cont.appendChild(card);
                    renderExItems(g);
                }
                cont.appendChild(card);
            });
        }

        function renderExItems(g) {
            const area = document.getElementById(`exs-${g}`);
            area.innerHTML = '';
            GROUPS[g].forEach(ex => {
                if (!workoutData[ex]) {
                    const saved = JSON.parse(localStorage.getItem('lock_'+ex));
                    workoutData[ex] = saved ? saved : [{w:'', r:''}, {w:'', r:''}, {w:'', r:''}, {w:'', r:''}];
                }
                const div = document.createElement('div');
                div.style.marginTop = '15px';
                div.innerHTML = `
                    <div class="ex-header"><strong>${ex}</strong></div>
                    <div id="sets-${ex}"></div>
                    <div class="btn-group">
                        <button class="btn-sml btn-add" onclick="changeSet('${ex}', 1)">+ Set</button>
                        <button class="btn-sml btn-rem" onclick="changeSet('${ex}', -1)">- Set</button>
                        <button class="btn-sml btn-lock" id="lck-${ex}" onclick="lockEx('${ex}')">🔒 Lock</button>
                    </div>`;
                area.appendChild(div);
                updateSetsUI(ex);
            });
        }

        function updateSetsUI(ex) {
            const area = document.getElementById(`sets-${ex}`);
            area.innerHTML = workoutData[ex].map((s, i) => `
                <div class="set-row">
                    <span style="font-size:12px; color:#666">S${i+1}</span>
                    <input type="number" value="${s.w}" placeholder="kg" oninput="workoutData['${ex}'][${i}].w=this.value">
                    <input type="number" value="${s.r}" placeholder="reps" oninput="workoutData['${ex}'][${i}].r=this.value">
                </div>
            `).join('');
        }

        function changeSet(ex, val) {
            if (val > 0) workoutData[ex].push({w:'', r:''});
            else if (workoutData[ex].length > 1) workoutData[ex].pop();
            updateSetsUI(ex);
        }

        function addEx(g) {
            const val = document.getElementById(`in-${g}`).value;
            if (val) { GROUPS[g].push(val); renderEx(); }
        }

        function lockEx(ex) {
            localStorage.setItem('lock_'+ex, JSON.stringify(workoutData[ex]));
            const btn = document.getElementById('lck-'+ex);
            btn.classList.add('active');
            btn.innerText = '✅ Locked';
        }

        function toggleT() {
            isT = !isT;
            document.getElementById('t-btn').innerText = isT ? '⏸' : '▶';
            if (isT) timerObj = setInterval(() => { sec++; updateTUI(); }, 1000);
            else clearInterval(timerObj);
        }

        function updateTUI() {
            const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
            document.getElementById('timer-val').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function saveW() {
            const entry = {
                date: new Date().toLocaleString('el-GR'),
                time: document.getElementById('timer-val').innerText,
                walk: walkMin,
                details: []
            };
            activeGroups.forEach(g => {
                GROUPS[g].forEach(ex => {
                    if (workoutData[ex]) {
                        entry.details.push({ name: ex, sets: [...workoutData[ex]] });
                    }
                });
            });
            const h = JSON.parse(localStorage.getItem('gym_h') || '[]');
            h.unshift(entry);
            localStorage.setItem('gym_h', JSON.stringify(h));
            alert('Η προπόνηση αποθηκεύτηκε!');
            location.reload();
        }

        function loadH() {
            const h = JSON.parse(localStorage.getItem('gym_h') || '[]');
            document.getElementById('hist-list').innerHTML = h.map(i => `
                <div class="history-card">
                    <div style="font-weight:bold; color:#764ba2">${i.date}</div>
                    <div style="font-size:13px; margin:5px 0;">⏱️ ${i.time} | 🚶 ${i.walk} min</div>
                    <div style="font-size:12px; color:#444">
                        ${i.details.map(d => `• ${d.name}: ${d.sets.length} sets`).join('<br>')}
                    </div>
                </div>
            `).join('');
        }

        function tab(s) {
            document.getElementById('screen-work').classList.toggle('hidden', s !== 'work');
            document.getElementById('screen-hist').classList.toggle('hidden', s !== 'hist');
            document.querySelectorAll('.nav-btn').forEach((b, idx) => b.classList.toggle('active', (idx===0 && s==='work') || (idx===1 && s==='hist')));
        }

        function clearData() { if (confirm('Διαγραφή όλων;')) { localStorage.clear(); location.reload(); } }

        init();
    </script>
</body>
</html>
