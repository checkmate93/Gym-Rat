
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💪 Gym Tracker Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6c5ce7;
            --primary-dark: #5b4cdb;
            --secondary: #00cec9;
            --danger: #ff7675;
            --warning: #fdcb6e;
            --success: #00b894;
            --dark: #2d3436;
            --light: #dfe6e9;
            --bg: #0a0a0f;
            --card-bg: #16161f;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --border-radius: 16px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 15px;
            background: var(--card-bg);
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 25px;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-btn:hover:not(.active) {
            background: rgba(108, 92, 231, 0.2);
        }

        .tab-content {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .muscle-groups {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .muscle-btn {
            padding: 15px 10px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            text-align: center;
            position: relative;
        }

        .muscle-btn.active {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        .muscle-btn:hover:not(.active) {
            background: rgba(108, 92, 231, 0.2);
        }

        .muscle-btn .delete-muscle {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            border: none;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .muscle-btn:hover .delete-muscle {
            display: flex;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: var(--dark);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text);
        }

        .btn-sm {
            padding: 8px 15px;
            font-size: 0.85rem;
        }

        .exercise-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .exercise-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--secondary);
        }

        .exercise-actions {
            display: flex;
            gap: 8px;
        }

        .lock-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .lock-btn.locked {
            background: var(--success);
            color: white;
        }

        .lock-btn.unlocked {
            background: rgba(255,255,255,0.1);
            color: var(--text-muted);
        }

        .sets-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .set-row {
            display: grid;
            grid-template-columns: 45px 1fr 1fr auto;
            gap: 8px;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
        }

        .set-number {
            background: var(--primary);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .set-input {
            width: 100%;
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text);
            text-align: center;
            font-size: 1rem;
        }

        .set-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .add-set-btn {
            width: 100%;
            padding: 10px;
            background: rgba(108, 92, 231, 0.2);
            border: 2px dashed var(--primary);
            border-radius: 8px;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .add-set-btn:hover {
            background: rgba(108, 92, 231, 0.4);
        }

        .exercise-notes {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .exercise-notes textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text);
            font-size: 0.9rem;
            resize: vertical;
            min-height: 60px;
        }

        .volume-display {
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.3), rgba(0, 206, 201, 0.3));
            border-radius: 10px;
            padding: 12px;
            margin-top: 12px;
            text-align: center;
        }

        .volume-display .volume-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .volume-display .volume-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--warning);
        }

        .total-volume-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--border-radius);
            padding: 20px;
            margin-top: 15px;
            text-align: center;
        }

        .total-volume-card h3 {
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .total-volume-card .big-number {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .total-volume-card .unit {
            font-size: 1rem;
            opacity: 0.8;
        }

        .history-item {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .history-date {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--secondary);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .history-duration {
            background: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .history-volume {
            background: var(--warning);
            color: var(--dark);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .history-muscles {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .muscle-tag {
            background: rgba(108, 92, 231, 0.3);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            color: var(--primary);
        }

        .history-exercise {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .history-exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .history-exercise-name {
            font-weight: 600;
            color: var(--warning);
        }

        .history-exercise-volume {
            font-size: 0.85rem;
            color: var(--secondary);
            font-weight: bold;
        }

        .history-sets {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-set {
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85rem;
        }

        .history-notes {
            margin-top: 8px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .history-muscle-section {
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(108, 92, 231, 0.1);
            border-radius: 10px;
        }

        .history-muscle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .history-muscle-name {
            font-weight: bold;
            color: var(--secondary);
        }

        .history-muscle-volume {
            background: var(--success);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
        }

        .calendar-container {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-nav {
            display: flex;
            gap: 10px;
        }

        .calendar-nav button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day-name {
            text-align: center;
            padding: 10px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            transition: all 0.3s;
            font-size: 0.9rem;
            position: relative;
        }

        .calendar-day:hover {
            background: rgba(108, 92, 231, 0.3);
        }

        .calendar-day.today {
            border: 2px solid var(--secondary);
        }

        .calendar-day.has-plan {
            background: rgba(108, 92, 231, 0.4);
        }

        .calendar-day.has-plan::after {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            position: absolute;
            bottom: 5px;
        }

        .calendar-day.other-month {
            opacity: 0.3;
        }

        .day-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .day-modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: var(--danger);
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .settings-section {
            margin-bottom: 25px;
        }

        .settings-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--secondary);
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .setting-label {
            color: var(--text);
        }

        .toggle-switch {
            width: 55px;
            height: 28px;
            background: rgba(255,255,255,0.1);
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: var(--success);
        }

        .toggle-switch::after {
            content: '';
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 3px;
            transition: transform 0.3s;
        }

        .toggle-switch.active::after {
            transform: translateX(27px);
        }

        .color-options {
            display: flex;
            gap: 10px;
        }

        .color-option {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.3s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.active {
            border-color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .workout-duration {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 20px;
        }

        .duration-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .duration-input {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 1.2rem;
            text-align: center;
        }

        .duration-input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .walking-input {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
        }

        .walking-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text);
            text-align: center;
            font-size: 1.1rem;
        }

        .delete-set-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: var(--danger);
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .quick-add {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .quick-add-btn {
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .quick-add-btn:hover {
            background: rgba(108, 92, 231, 0.3);
        }

        .add-muscle-form {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .add-muscle-form input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: var(--text);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--secondary);
        }

        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .set-row {
                grid-template-columns: 40px 1fr 1fr auto;
                gap: 5px;
            }
            
            .muscle-groups {
                grid-template-columns: repeat(3, 1fr);
            }

            .btn {
                padding: 10px 15px;
                font-size: 0.9rem;
            }

            .history-date {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💪 Gym Tracker Pro</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="workout">🏋️ Προπόνηση</button>
        <button class="tab-btn" data-tab="history">📊 Ιστορικό</button>
        <button class="tab-btn" data-tab="calendar">📅 Ημερολόγιο</button>
        <button class="tab-btn" data-tab="settings">⚙️ Ρυθμίσεις</button>
    </div>

    <!-- WORKOUT TAB -->
    <div id="workout" class="tab-content active">
        <div class="workout-duration">
            <div class="form-group" style="margin-bottom:0;">
                <label style="color:white;">⏱️ Διάρκεια Προπόνησης (λεπτά)</label>
                <div class="duration-input-group">
                    <input type="number" id="workoutDuration" class="duration-input" placeholder="π.χ. 60">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🎯 Επιλογή Μυϊκής Ομάδας</div>
            <div class="muscle-groups" id="muscleGroupsContainer"></div>
            <div class="add-muscle-form">
                <input type="text" id="newMuscleName" placeholder="Νέα μυϊκή ομάδα...">
                <input type="text" id="newMuscleIcon" placeholder="Emoji" maxlength="2" style="width:60px; text-align:center;">
                <button class="btn btn-primary" onclick="addMuscleGroup()">+</button>
            </div>
        </div>

        <div id="exerciseArea"></div>

        <div id="sessionVolume"></div>

        <div style="text-align:center; margin-top:20px;">
            <button class="btn btn-success" style="width:100%; padding:18px;" onclick="saveWorkout()">
                💾 Αποθήκευση Προπόνησης
            </button>
        </div>
    </div>

    <!-- HISTORY TAB -->
    <div id="history" class="tab-content">
        <div class="card">
            <div class="card-title">📊 Ιστορικό Προπονήσεων</div>
            <div id="historyList"></div>
        </div>
    </div>

    <!-- CALENDAR TAB -->
    <div id="calendar" class="tab-content">
        <div class="calendar-container">
            <div class="calendar-header">
                <button class="btn btn-secondary" onclick="changeMonth(-1)">◀</button>
                <h2 id="calendarTitle"></h2>
                <button class="btn btn-secondary" onclick="changeMonth(1)">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        <div class="card" style="margin-top:20px;">
            <div class="card-title">📋 Προγραμματισμένες Προπονήσεις</div>
            <div id="plannedWorkouts"></div>
        </div>
    </div>

    <!-- SETTINGS TAB -->
    <div id="settings" class="tab-content">
        <div class="card">
            <div class="settings-section">
                <div class="settings-title">🎨 Εμφάνιση</div>
                <div class="setting-item">
                    <span class="setting-label">Σκούρο Θέμα</span>
                    <div class="toggle-switch active" id="darkModeToggle" onclick="toggleSetting('darkMode')"></div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">Χρώμα Θέματος</span>
                    <div class="color-options">
                        <div class="color-option active" style="background:#6c5ce7;" data-color="#6c5ce7" onclick="changeColor('#6c5ce7')"></div>
                        <div class="color-option" style="background:#00b894;" data-color="#00b894" onclick="changeColor('#00b894')"></div>
                        <div class="color-option" style="background:#e17055;" data-color="#e17055" onclick="changeColor('#e17055')"></div>
                        <div class="color-option" style="background:#0984e3;" data-color="#0984e3" onclick="changeColor('#0984e3')"></div>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-title">⚡ Λειτουργικότητα</div>
                <div class="setting-item">
                    <span class="setting-label">Αυτόματη Αποθήκευση</span>
                    <div class="toggle-switch" id="autoSaveToggle" onclick="toggleSetting('autoSave')"></div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">Ειδοποιήσεις</span>
                    <div class="toggle-switch active" id="notificationsToggle" onclick="toggleSetting('notifications')"></div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">Εμφάνιση Volume</span>
                    <div class="toggle-switch active" id="showVolumeToggle" onclick="toggleSetting('showVolume')"></div>
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-title">📦 Δεδομένα</div>
                <button class="btn btn-warning" onclick="exportData()" style="width:100%; margin-bottom:10px;">
                    📤 Εξαγωγή Δεδομένων
                </button>
                <button class="btn btn-danger" onclick="clearAllData()" style="width:100%;">
                    🗑️ Διαγραφή Όλων
                </button>
            </div>
        </div>
    </div>

    <!-- DAY MODAL -->
    <div class="day-modal" id="dayModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalDate">📅 Ημερομηνία</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="form-group">
                <label>Πρόγραμμα Προπόνησης (Συντομογραφίες)</label>
                <input type="text" id="planShort" placeholder="π.χ. Ω+Σ, Π, ΔΙΚ+ΤΡΙΚ">
            </div>
            <div class="form-group">
                <label>Σχόλια / Σημειώσεις</label>
                <textarea id="planNotes" rows="4" placeholder="Σημειώσεις για τη μέρα..."></textarea>
            </div>
            <div class="quick-add" id="quickAddButtons"></div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn btn-success" style="flex:1;" onclick="savePlan()">💾 Αποθήκευση</button>
                <button class="btn btn-danger" onclick="deletePlan()">🗑️</button>
            </div>
        </div>
    </div>

    <!-- EDIT WORKOUT MODAL -->
    <div class="day-modal" id="editModal">
        <div class="modal-content" style="max-width:600px;">
            <div class="modal-header">
                <h3>✏️ Επεξεργασία Προπόνησης</h3>
                <button class="modal-close" onclick="closeEditModal()">✕</button>
            </div>
            <div id="editContent"></div>
            <div style="margin-top:20px;">
                <button class="btn btn-success" style="width:100%;" onclick="saveEditedWorkout()">💾 Αποθήκευση Αλλαγών</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== DEFAULT MUSCLE GROUPS ====================
        const defaultMuscleGroups = [
            { id: 'shoulders', name: 'Ώμοι', icon: '💪', isDefault: true },
            { id: 'chest', name: 'Στήθος', icon: '🫁', isDefault: true },
            { id: 'back', name: 'Πλάτη', icon: '🔙', isDefault: true },
            { id: 'biceps', name: 'Δικέφαλα', icon: '💪', isDefault: true },
            { id: 'triceps', name: 'Τρικέφαλα', icon: '💪', isDefault: true },
            { id: 'legs', name: 'Πόδια', icon: '🦵', isDefault: true },
            { id: 'abs', name: 'Κοιλιακοί', icon: '🎯', isDefault: true },
            { id: 'crossfit', name: 'CrossFit', icon: '🔥', isDefault: true },
            { id: 'walking', name: 'Περπάτημα', icon: '🚶', isDefault: true, isCardio: true }
        ];

        // ==================== DATA STORAGE ====================
        let muscleGroups = JSON.parse(localStorage.getItem('muscleGroups')) || [...defaultMuscleGroups];
        let lockedExercises = JSON.parse(localStorage.getItem('lockedExercises')) || {};
        let todayExercises = JSON.parse(localStorage.getItem('todayExercises')) || {};
        let workoutHistory = JSON.parse(localStorage.getItem('workoutHistory')) || [];
        let calendarPlans = JSON.parse(localStorage.getItem('calendarPlans')) || {};
        let settings = JSON.parse(localStorage.getItem('gymSettings')) || {
            darkMode: true,
            autoSave: false,
            notifications: true,
            showVolume: true,
            primaryColor: '#6c5ce7'
        };

        let currentMuscle = null;
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let selectedDate = null;
        let editingWorkoutIndex = null;

        // ==================== HELPER FUNCTIONS ====================
        function getMuscleById(id) {
            return muscleGroups.find(m => m.id === id) || { name: id, icon: '💪' };
        }

        function calculateExerciseVolume(exercise) {
            if (!exercise.sets || exercise.sets.length === 0) return 0;
            return exercise.sets.reduce((total, set) => {
                const weight = parseFloat(set.weight) || 0;
                const reps = parseFloat(set.reps) || 0;
                return total + (weight * reps);
            }, 0);
        }

        function calculateMuscleVolume(exercises) {
            if (!Array.isArray(exercises)) return 0;
            return exercises.reduce((total, ex) => total + calculateExerciseVolume(ex), 0);
        }

        function calculateTotalVolume(exercisesObj) {
            let total = 0;
            Object.entries(exercisesObj).forEach(([muscle, data]) => {
                if (Array.isArray(data)) {
                    total += calculateMuscleVolume(data);
                }
            });
            return total;
        }

        function formatVolume(volume) {
            if (volume >= 1000) {
                return (volume / 1000).toFixed(1) + 'k';
            }
            return volume.toLocaleString('el-GR');
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            initTabs();
            renderMuscleGroups();
            renderHistory();
            renderCalendar();
            applySettings();
            updateSessionVolume();
        });

        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.tab).classList.add('active');
                });
            });
        }

        // ==================== MUSCLE GROUPS MANAGEMENT ====================
        function renderMuscleGroups() {
            const container = document.getElementById('muscleGroupsContainer');
            container.innerHTML = muscleGroups.map(muscle => `
                <button class="muscle-btn ${currentMuscle === muscle.id ? 'active' : ''}" 
                        data-muscle="${muscle.id}" onclick="selectMuscle('${muscle.id}')">
                    ${muscle.icon} ${muscle.name}
                    ${!muscle.isDefault ? `<span class="delete-muscle" onclick="event.stopPropagation(); deleteMuscleGroup('${muscle.id}')">✕</span>` : ''}
                </button>
            `).join('');
            
            updateQuickAddButtons();
        }

        function selectMuscle(muscleId) {
            if (currentMuscle === muscleId) {
                currentMuscle = null;
                document.getElementById('exerciseArea').innerHTML = '';
            } else {
                currentMuscle = muscleId;
                renderExerciseArea(muscleId);
            }
            renderMuscleGroups();
            updateSessionVolume();
        }

        function addMuscleGroup() {
            const nameInput = document.getElementById('newMuscleName');
            const iconInput = document.getElementById('newMuscleIcon');
            
            const name = nameInput.value.trim();
            const icon = iconInput.value.trim() || '💪';
            
            if (!name) {
                alert('Παρακαλώ εισάγετε όνομα!');
                return;
            }

            const id = name.toLowerCase().replace(/\s+/g, '_') + '_' + Date.now();
            
            muscleGroups.push({
                id: id,
                name: name,
                icon: icon,
                isDefault: false
            });

            localStorage.setItem('muscleGroups', JSON.stringify(muscleGroups));
            nameInput.value = '';
            iconInput.value = '';
            renderMuscleGroups();
        }

        function deleteMuscleGroup(muscleId) {
            if (!confirm('Διαγραφή μυϊκής ομάδας;')) return;
            
            muscleGroups = muscleGroups.filter(m => m.id !== muscleId);
            localStorage.setItem('muscleGroups', JSON.stringify(muscleGroups));
            
            // Clean up related data
            delete lockedExercises[muscleId];
            delete todayExercises[muscleId];
            saveLockedExercises();
            saveTodayExercises();
            
            if (currentMuscle === muscleId) {
                currentMuscle = null;
                document.getElementById('exerciseArea').innerHTML = '';
            }
            
            renderMuscleGroups();
            updateSessionVolume();
        }

        function updateQuickAddButtons() {
            const container = document.getElementById('quickAddButtons');
            container.innerHTML = muscleGroups.map(muscle => `
                <button class="quick-add-btn" onclick="addQuickPlan('${muscle.name.substring(0, 3).toUpperCase()}')">
                    ${muscle.icon} ${muscle.name}
                </button>
            `).join('') + `
                <button class="quick-add-btn" onclick="addQuickPlan('REST')">😴 Ξεκούραση</button>
            `;
        }

        // ==================== EXERCISE AREA ====================
        function renderExerciseArea(muscleId) {
            const area = document.getElementById('exerciseArea');
            const muscle = getMuscleById(muscleId);
            
            if (muscle.isCardio) {
                area.innerHTML = `
                    <div class="card">
                        <div class="card-title">${muscle.icon} ${muscle.name}</div>
                        <div class="walking-input">
                            <span>Λεπτά:</span>
                            <input type="number" id="walkingMinutes" value="${todayExercises[muscleId]?.minutes || ''}" 
                                   placeholder="0" onchange="updateWalking('${muscleId}')">
                        </div>
                        <div class="exercise-notes" style="margin-top:15px;">
                            <textarea placeholder="Σχόλια..." onchange="updateWalkingNotes('${muscleId}', this.value)">${todayExercises[muscleId]?.notes || ''}</textarea>
                        </div>
                    </div>
                `;
                return;
            }

            // Initialize muscle group if not exists
            if (!todayExercises[muscleId]) {
                todayExercises[muscleId] = [];
            }

            // Add locked exercises if not already added
            if (lockedExercises[muscleId]) {
                lockedExercises[muscleId].forEach(locked => {
                    const exists = todayExercises[muscleId].some(ex => ex.id === locked.id);
                    if (!exists) {
                        todayExercises[muscleId].push({
                            ...locked,
                            sets: locked.sets.map(s => ({...s}))
                        });
                    }
                });
            }

            const muscleVolume = calculateMuscleVolume(todayExercises[muscleId]);

            let html = `
                <div class="card">
                    <div class="card-title">${muscle.icon} ${muscle.name} - Ασκήσεις</div>
                    <div id="exerciseList-${muscleId}">
                        ${renderExercises(muscleId)}
                    </div>
                    <div class="form-group" style="margin-top:20px;">
                        <label>➕ Προσθήκη Νέας Άσκησης</label>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="newExercise-${muscleId}" placeholder="Όνομα άσκησης...">
                            <button class="btn btn-primary" onclick="addExercise('${muscleId}')">+</button>
                        </div>
                    </div>
                    ${settings.showVolume ? `
                    <div class="total-volume-card">
                        <h3>📊 Συνολικό Volume - ${muscle.name}</h3>
                        <div class="big-number">${formatVolume(muscleVolume)}</div>
                        <div class="unit">kg × επαναλήψεις</div>
                    </div>
                    ` : ''}
                </div>
            `;

            area.innerHTML = html;
        }

        function renderExercises(muscleId) {
            if (!todayExercises[muscleId] || todayExercises[muscleId].length === 0) {
                return '<div class="empty-state"><div class="empty-state-icon">🏋️</div><p>Δεν υπάρχουν ασκήσεις. Προσθέστε μία!</p></div>';
            }

            return todayExercises[muscleId].map((ex, index) => {
                const exerciseVolume = calculateExerciseVolume(ex);
                return `
                <div class="exercise-item" data-index="${index}">
                    <div class="exercise-header">
                        <span class="exercise-name">${ex.name}</span>
                        <div class="exercise-actions">
                            <button class="lock-btn ${ex.locked ? 'locked' : 'unlocked'}" 
                                    onclick="toggleLock('${muscleId}', ${index})" 
                                    title="${ex.locked ? 'Κλειδωμένο' : 'Ξεκλείδωτο'}">
                                ${ex.locked ? '🔒' : '🔓'}
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="deleteExercise('${muscleId}', ${index})">🗑️</button>
                        </div>
                    </div>
                    <div class="sets-container">
                        ${ex.sets.map((set, setIndex) => `
                            <div class="set-row">
                                <div class="set-number">${setIndex + 1}</div>
                                <input type="number" class="set-input" placeholder="Κιλά" 
                                       value="${set.weight || ''}"
                                       onchange="updateSet('${muscleId}', ${index}, ${setIndex}, 'weight', this.value)">
                                <input type="number" class="set-input" placeholder="Επαν." 
                                       value="${set.reps || ''}"
                                       onchange="updateSet('${muscleId}', ${index}, ${setIndex}, 'reps', this.value)">
                                <button class="delete-set-btn" onclick="deleteSet('${muscleId}', ${index}, ${setIndex})">✕</button>
                            </div>
                        `).join('')}
                        <button class="add-set-btn" onclick="addSet('${muscleId}', ${index})">+ Προσθήκη Σετ</button>
                    </div>
                    <div class="exercise-notes">
                        <textarea placeholder="Σχόλια για την άσκηση..." 
                                  onchange="updateExerciseNotes('${muscleId}', ${index}, this.value)">${ex.notes || ''}</textarea>
                    </div>
                    ${settings.showVolume ? `
                    <div class="volume-display">
                        <div class="volume-label">Volume Άσκησης</div>
                        <div class="volume-value">${formatVolume(exerciseVolume)} kg</div>
                    </div>
                    ` : ''}
                </div>
            `}).join('');
        }

        function addExercise(muscleId) {
            const input = document.getElementById(`newExercise-${muscleId}`);
            const name = input.value.trim();
            
            if (!name) {
                alert('Παρακαλώ εισάγετε όνομα άσκησης!');
                return;
            }

            if (!todayExercises[muscleId]) {
                todayExercises[muscleId] = [];
            }

            const newExercise = {
                id: Date.now(),
                name: name,
                locked: false,
                notes: '',
                sets: [{ weight: '', reps: '' }]
            };

            todayExercises[muscleId].push(newExercise);
            saveTodayExercises();
            renderExerciseArea(muscleId);
            updateSessionVolume();
        }

        function deleteExercise(muscleId, index) {
            if (confirm('Διαγραφή άσκησης;')) {
                const exercise = todayExercises[muscleId][index];
                
                // Remove from locked if exists
                if (lockedExercises[muscleId]) {
                    lockedExercises[muscleId] = lockedExercises[muscleId].filter(ex => ex.id !== exercise.id);
                    saveLockedExercises();
                }

                todayExercises[muscleId].splice(index, 1);
                saveTodayExercises();
                renderExerciseArea(muscleId);
                updateSessionVolume();
            }
        }

        function toggleLock(muscleId, index) {
            const exercise = todayExercises[muscleId][index];
            exercise.locked = !exercise.locked;

            if (!lockedExercises[muscleId]) {
                lockedExercises[muscleId] = [];
            }

            if (exercise.locked) {
                const existingIndex = lockedExercises[muscleId].findIndex(ex => ex.id === exercise.id);
                if (existingIndex >= 0) {
                    lockedExercises[muscleId][existingIndex] = JSON.parse(JSON.stringify(exercise));
                } else {
                    lockedExercises[muscleId].push(JSON.parse(JSON.stringify(exercise)));
                }
            } else {
                lockedExercises[muscleId] = lockedExercises[muscleId].filter(ex => ex.id !== exercise.id);
            }

            saveLockedExercises();
            saveTodayExercises();
            renderExerciseArea(muscleId);
        }

        function addSet(muscleId, exerciseIndex) {
            todayExercises[muscleId][exerciseIndex].sets.push({ weight: '', reps: '' });
            saveTodayExercises();
            renderExerciseArea(muscleId);
        }

        function deleteSet(muscleId, exerciseIndex, setIndex) {
            if (todayExercises[muscleId][exerciseIndex].sets.length > 1) {
                todayExercises[muscleId][exerciseIndex].sets.splice(setIndex, 1);
                saveTodayExercises();
                renderExerciseArea(muscleId);
                updateSessionVolume();
            }
        }

        function updateSet(muscleId, exerciseIndex, setIndex, field, value) {
            todayExercises[muscleId][exerciseIndex].sets[setIndex][field] = value;
            saveTodayExercises();
            
            // Update locked exercise if locked
            const exercise = todayExercises[muscleId][exerciseIndex];
            if (exercise.locked && lockedExercises[muscleId]) {
                const lockedIndex = lockedExercises[muscleId].findIndex(ex => ex.id === exercise.id);
                if (lockedIndex >= 0) {
                    lockedExercises[muscleId][lockedIndex] = JSON.parse(JSON.stringify(exercise));
                    saveLockedExercises();
                }
            }
            
            // Refresh to update volume
            renderExerciseArea(muscleId);
            updateSessionVolume();
        }

        function updateExerciseNotes(muscleId, exerciseIndex, notes) {
            todayExercises[muscleId][exerciseIndex].notes = notes;
            saveTodayExercises();
            
            // Update locked exercise if locked
            const exercise = todayExercises[muscleId][exerciseIndex];
            if (exercise.locked && lockedExercises[muscleId]) {
                const lockedIndex = lockedExercises[muscleId].findIndex(ex => ex.id === exercise.id);
                if (lockedIndex >= 0) {
                    lockedExercises[muscleId][lockedIndex].notes = notes;
                    saveLockedExercises();
                }
            }
        }

        function updateWalking(muscleId) {
            const minutes = document.getElementById('walkingMinutes').value;
            if (!todayExercises[muscleId]) {
                todayExercises[muscleId] = {};
            }
            todayExercises[muscleId].minutes = minutes;
            saveTodayExercises();
        }

        function updateWalkingNotes(muscleId, notes) {
            if (!todayExercises[muscleId]) {
                todayExercises[muscleId] = {};
            }
            todayExercises[muscleId].notes = notes;
            saveTodayExercises();
        }

        // ==================== SESSION VOLUME ====================
        function updateSessionVolume() {
            const container = document.getElementById('sessionVolume');
            
            if (!settings.showVolume) {
                container.innerHTML = '';
                return;
            }

            const totalVolume = calculateTotalVolume(todayExercises);
            let muscleVolumes = [];

            Object.entries(todayExercises).forEach(([muscleId, data]) => {
                if (Array.isArray(data) && data.length > 0) {
                    const muscle = getMuscleById(muscleId);
                    const volume = calculateMuscleVolume(data);
                    if (volume > 0) {
                        muscleVolumes.push({ name: muscle.name, icon: muscle.icon, volume });
                    }
                }
            });

            if (totalVolume === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = `
                <div class="card">
                    <div class="card-title">📊 Στατιστικά Προπόνησης</div>
                    <div class="total-volume-card" style="background: linear-gradient(135deg, #00b894, #00cec9);">
                        <h3>🏆 Συνολικό Volume Προπόνησης</h3>
                        <div class="big-number">${formatVolume(totalVolume)}</div>
                        <div class="unit">kg × επαναλήψεις</div>
                    </div>
                    ${muscleVolumes.length > 0 ? `
                    <div class="stats-grid">
                        ${muscleVolumes.map(mv => `
                            <div class="stat-card">
                                <div class="stat-value">${formatVolume(mv.volume)}</div>
                                <div class="stat-label">${mv.icon} ${mv.name}</div>
                            </div>
                        `).join('')}
                    </div>
                    ` : ''}
                </div>
            `;
        }

        // ==================== SAVE WORKOUT ====================
        function saveWorkout() {
            const duration = document.getElementById('workoutDuration').value;
            
            let hasExercises = false;
            const muscleGroupsUsed = [];

            Object.entries(todayExercises).forEach(([muscleId, data]) => {
                const muscle = getMuscleById(muscleId);
                if (muscle.isCardio && data?.minutes) {
                    hasExercises = true;
                    muscleGroupsUsed.push(muscleId);
                } else if (Array.isArray(data) && data.length > 0) {
                    const hasData = data.some(ex => 
                        ex.sets.some(set => set.weight || set.reps)
                    );
                    if (hasData) {
                        hasExercises = true;
                        muscleGroupsUsed.push(muscleId);
                    }
                }
            });

            if (!hasExercises) {
                alert('Προσθέστε τουλάχιστον μία άσκηση!');
                return;
            }

            const totalVolume = calculateTotalVolume(todayExercises);

            const workout = {
                id: Date.now(),
                date: new Date().toLocaleDateString('el-GR'),
                timestamp: Date.now(),
                duration: duration || 0,
                muscles: muscleGroupsUsed,
                exercises: JSON.parse(JSON.stringify(todayExercises)),
                totalVolume: totalVolume
            };

            workoutHistory.unshift(workout);
            localStorage.setItem('workoutHistory', JSON.stringify(workoutHistory));

            // Clear today's non-locked exercises
            Object.keys(todayExercises).forEach(muscleId => {
                const muscle = getMuscleById(muscleId);
                if (muscle.isCardio) {
                    delete todayExercises[muscleId];
                } else if (Array.isArray(todayExercises[muscleId])) {
                    todayExercises[muscleId] = todayExercises[muscleId].filter(ex => ex.locked);
                }
            });
            saveTodayExercises();

            document.getElementById('workoutDuration').value = '';
            currentMuscle = null;
            document.getElementById('exerciseArea').innerHTML = '';
            renderMuscleGroups();
            updateSessionVolume();

            alert('✅ Η προπόνηση αποθηκεύτηκε!');
            renderHistory();
        }

        // ==================== HISTORY ====================
        function renderHistory() {
            const container = document.getElementById('historyList');
            
            if (workoutHistory.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><p>Δεν υπάρχει ιστορικό προπονήσεων</p></div>';
                return;
            }

            container.innerHTML = workoutHistory.map((workout, index) => {
                const totalVolume = workout.totalVolume || calculateTotalVolume(workout.exercises);
                
                return `
                <div class="history-item">
                    <div class="history-date">
                        <span>📅 ${workout.date}</span>
                        <div>
                            <span class="history-duration">⏱️ ${workout.duration || 0}'</span>
                            ${totalVolume > 0 ? `<span class="history-volume">📊 ${formatVolume(totalVolume)} kg</span>` : ''}
                        </div>
                    </div>
                    <div class="history-muscles">
                        ${workout.muscles.map(m => {
                            const muscle = getMuscleById(m);
                            return `<span class="muscle-tag">${muscle.icon} ${muscle.name}</span>`;
                        }).join('')}
                    </div>
                    ${Object.entries(workout.exercises).map(([muscleId, data]) => {
                        const muscle = getMuscleById(muscleId);
                        
                        if (muscle.isCardio && data?.minutes) {
                            return `
                                <div class="history-muscle-section">
                                    <div class="history-muscle-header">
                                        <span class="history-muscle-name">${muscle.icon} ${muscle.name}</span>
                                    </div>
                                    <div class="history-exercise">
                                        <div class="history-exercise-name">⏱️ ${data.minutes} λεπτά</div>
                                        ${data.notes ? `<div class="history-notes">💬 ${data.notes}</div>` : ''}
                                    </div>
                                </div>
                            `;
                        }
                        
                        if (!Array.isArray(data) || data.length === 0) return '';
                        
                        const muscleVolume = calculateMuscleVolume(data);
                        
                        return `
                            <div class="history-muscle-section">
                                <div class="history-muscle-header">
                                    <span class="history-muscle-name">${muscle.icon} ${muscle.name}</span>
                                    ${muscleVolume > 0 ? `<span class="history-muscle-volume">${formatVolume(muscleVolume)} kg</span>` : ''}
                                </div>
                                ${data.map(ex => {
                                    const exVolume = calculateExerciseVolume(ex);
                                    return `
                                        <div class="history-exercise">
                                            <div class="history-exercise-header">
                                                <span class="history-exercise-name">${ex.name}</span>
                                                ${exVolume > 0 ? `<span class="history-exercise-volume">${formatVolume(exVolume)} kg</span>` : ''}
                                            </div>
                                            <div class="history-sets">
                                                ${ex.sets.map((set, i) => `
                                                    <span class="history-set">Σετ ${i+1}: ${set.weight || '-'}kg × ${set.reps || '-'}</span>
                                                `).join('')}
                                            </div>
                                            ${ex.notes ? `<div class="history-notes">💬 ${ex.notes}</div>` : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        `;
                    }).join('')}
                    <div style="margin-top:15px; display:flex; gap:10px;">
                        <button class="btn btn-primary btn-sm" onclick="editWorkout(${index})">✏️ Επεξεργασία</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteWorkout(${index})">🗑️ Διαγραφή</button>
                    </div>
                </div>
            `}).join('');
        }

        function deleteWorkout(index) {
            if (confirm('Διαγραφή προπόνησης;')) {
                workoutHistory.splice(index, 1);
                localStorage.setItem('workoutHistory', JSON.stringify(workoutHistory));
                renderHistory();
            }
        }

        function editWorkout(index) {
            editingWorkoutIndex = index;
            const workout = workoutHistory[index];
            
            let html = `
                <div class="form-group">
                    <label>⏱️ Διάρκεια (λεπτά)</label>
                    <input type="number" id="editDuration" value="${workout.duration || 0}">
                </div>
            `;

            Object.entries(workout.exercises).forEach(([muscleId, data]) => {
                const muscle = getMuscleById(muscleId);
                
                if (muscle.isCardio && data?.minutes) {
                    html += `
                        <div class="card" style="margin-top:15px;">
                            <div class="card-title">${muscle.icon} ${muscle.name}</div>
                            <div class="form-group">
                                <label>Λεπτά</label>
                                <input type="number" id="editCardio-${muscleId}" value="${data.minutes}">
                            </div>
                            <div class="form-group">
                                <label>Σχόλια</label>
                                <textarea id="editCardioNotes-${muscleId}">${data.notes || ''}</textarea>
                            </div>
                        </div>
                    `;
                } else if (Array.isArray(data)) {
                    html += `<div class="card" style="margin-top:15px;"><div class="card-title">${muscle.icon} ${muscle.name}</div>`;
                    data.forEach((ex, exIndex) => {
                        html += `
                            <div class="exercise-item">
                                <div class="form-group">
                                    <label>Όνομα Άσκησης</label>
                                    <input type="text" value="${ex.name}" id="editExName-${muscleId}-${exIndex}">
                                </div>
                                <div class="sets-container">
                                    ${ex.sets.map((set, setIndex) => `
                                        <div class="set-row">
                                            <div class="set-number">${setIndex + 1}</div>
                                            <input type="number" class="set-input" placeholder="Κιλά" 
                                                   value="${set.weight || ''}"
                                                   id="editSet-${muscleId}-${exIndex}-${setIndex}-weight">
                                            <input type="number" class="set-input" placeholder="Επαν." 
                                                   value="${set.reps || ''}"
                                                   id="editSet-${muscleId}-${exIndex}-${setIndex}-reps">
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="form-group" style="margin-top:10px;">
                                    <label>Σχόλια</label>
                                    <textarea id="editExNotes-${muscleId}-${exIndex}">${ex.notes || ''}</textarea>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
            });

            document.getElementById('editContent').innerHTML = html;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingWorkoutIndex = null;
        }

        function saveEditedWorkout() {
            if (editingWorkoutIndex === null) return;
            
            const workout = workoutHistory[editingWorkoutIndex];
            workout.duration = document.getElementById('editDuration').value;

            Object.entries(workout.exercises).forEach(([muscleId, data]) => {
                const muscle = getMuscleById(muscleId);
                
                if (muscle.isCardio) {
                    const minutesInput = document.getElementById(`editCardio-${muscleId}`);
                    const notesInput = document.getElementById(`editCardioNotes-${muscleId}`);
                    if (minutesInput) {
                        workout.exercises[muscleId] = {
                            minutes: minutesInput.value,
                            notes: notesInput ? notesInput.value : ''
                        };
                    }
                } else if (Array.isArray(data)) {
                    data.forEach((ex, exIndex) => {
                        const nameInput = document.getElementById(`editExName-${muscleId}-${exIndex}`);
                        const notesInput = document.getElementById(`editExNotes-${muscleId}-${exIndex}`);
                        if (nameInput) ex.name = nameInput.value;
                        if (notesInput) ex.notes = notesInput.value;
                        
                        ex.sets.forEach((set, setIndex) => {
                            const weightInput = document.getElementById(`editSet-${muscleId}-${exIndex}-${setIndex}-weight`);
                            const repsInput = document.getElementById(`editSet-${muscleId}-${exIndex}-${setIndex}-reps`);
                            if (weightInput) set.weight = weightInput.value;
                            if (repsInput) set.reps = repsInput.value;
                        });
                    });
                }
            });

            // Recalculate total volume
            workout.totalVolume = calculateTotalVolume(workout.exercises);

            localStorage.setItem('workoutHistory', JSON.stringify(workoutHistory));
            closeEditModal();
            renderHistory();
            alert('✅ Αλλαγές αποθηκεύτηκαν!');
        }

        // ==================== CALENDAR ====================
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const title = document.getElementById('calendarTitle');
            
            const months = ['Ιανουάριος', 'Φεβρουάριος', 'Μάρτιος', 'Απρίλιος', 'Μάιος', 'Ιούνιος', 
                           'Ιούλιος', 'Αύγουστος', 'Σεπτέμβριος', 'Οκτώβριος', 'Νοέμβριος', 'Δεκέμβριος'];
            const days = ['Κυρ', 'Δευ', 'Τρι', 'Τετ', 'Πεμ', 'Παρ', 'Σαβ'];
            
            title.textContent = `${months[currentMonth]} ${currentYear}`;

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            let html = days.map(d => `<div class="calendar-day-name">${d}</div>`).join('');

            // Previous month days
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += `<div class="calendar-day other-month">${day}</div>`;
            }

            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = dateStr === todayStr;
                const hasPlan = calendarPlans[dateStr];
                
                html += `<div class="calendar-day ${isToday ? 'today' : ''} ${hasPlan ? 'has-plan' : ''}" 
                             onclick="openDayModal('${dateStr}')">${day}</div>`;
            }

            // Next month days
            const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
            const remaining = totalCells - (firstDay + daysInMonth);
            for (let i = 1; i <= remaining; i++) {
                html += `<div class="calendar-day other-month">${i}</div>`;
            }

            grid.innerHTML = html;
            renderPlannedWorkouts();
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        function openDayModal(dateStr) {
            selectedDate = dateStr;
            const parts = dateStr.split('-');
            const formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
            
            document.getElementById('modalDate').textContent = `📅 ${formattedDate}`;
            
            const plan = calendarPlans[dateStr] || {};
            document.getElementById('planShort').value = plan.short || '';
            document.getElementById('planNotes').value = plan.notes || '';
            
            document.getElementById('dayModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('dayModal').classList.remove('active');
            selectedDate = null;
        }

        function addQuickPlan(text) {
            const input = document.getElementById('planShort');
            if (input.value && !input.value.endsWith('+') && !input.value.endsWith(' ')) {
                input.value += ' + ';
            }
            input.value += text;
        }

        function savePlan() {
            if (!selectedDate) return;
            
            const short = document.getElementById('planShort').value.trim();
            const notes = document.getElementById('planNotes').value.trim();
            
            if (short || notes) {
                calendarPlans[selectedDate] = { short, notes };
            } else {
                delete calendarPlans[selectedDate];
            }
            
            localStorage.setItem('calendarPlans', JSON.stringify(calendarPlans));
            closeModal();
            renderCalendar();
        }

        function deletePlan() {
            if (!selectedDate) return;
            delete calendarPlans[selectedDate];
            localStorage.setItem('calendarPlans', JSON.stringify(calendarPlans));
            closeModal();
            renderCalendar();
        }

        function renderPlannedWorkouts() {
            const container = document.getElementById('plannedWorkouts');
            const plans = Object.entries(calendarPlans).sort((a, b) => a[0].localeCompare(b[0]));
            
            // Filter future plans
            const today = new Date().toISOString().split('T')[0];
            const futurePlans = plans.filter(([date]) => date >= today);
            
            if (futurePlans.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>Δεν υπάρχουν προγραμματισμένες προπονήσεις</p></div>';
                return;
            }

            container.innerHTML = futurePlans.map(([date, plan]) => {
                const parts = date.split('-');
                const formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
                return `
                    <div class="history-item" onclick="openDayModal('${date}')" style="cursor:pointer;">
                        <div class="history-date">${formattedDate}</div>
                        <p style="color:var(--primary); font-weight:600;">${plan.short || 'Χωρίς πρόγραμμα'}</p>
                        ${plan.notes ? `<p style="color:var(--text-muted); margin-top:5px; font-size:0.9rem;">${plan.notes}</p>` : ''}
                    </div>
                `;
            }).join('');
        }

        // ==================== SETTINGS ====================
        function toggleSetting(setting) {
            settings[setting] = !settings[setting];
            const toggle = document.getElementById(`${setting}Toggle`);
            if (toggle) {
                toggle.classList.toggle('active', settings[setting]);
            }
            localStorage.setItem('gymSettings', JSON.stringify(settings));
            applySettings();
            
            if (setting === 'showVolume') {
                if (currentMuscle) {
                    renderExerciseArea(currentMuscle);
                }
                updateSessionVolume();
                renderHistory();
            }
        }

        function changeColor(color) {
            settings.primaryColor = color;
            document.querySelectorAll('.color-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.color === color);
            });
            localStorage.setItem('gymSettings', JSON.stringify(settings));
            applySettings();
        }

        function applySettings() {
            document.documentElement.style.setProperty('--primary', settings.primaryColor);
            
            document.querySelectorAll('.toggle-switch').forEach(toggle => {
                const settingName = toggle.id.replace('Toggle', '');
                toggle.classList.toggle('active', settings[settingName]);
            });

            document.querySelectorAll('.color-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.color === settings.primaryColor);
            });
        }

        function exportData() {
            const data = {
                muscleGroups,
                lockedExercises,
                workoutHistory,
                calendarPlans,
                settings,
                exportDate: new Date().toISOString()
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gym-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function clearAllData() {
            if (confirm('⚠️ Διαγραφή ΟΛΩΝ των δεδομένων; Αυτή η ενέργεια δεν αναιρείται!')) {
                if (confirm('Είστε σίγουροι;')) {
                    localStorage.clear();
                    location.reload();
                }
            }
        }

        // ==================== STORAGE HELPERS ====================
        function saveTodayExercises() {
            localStorage.setItem('todayExercises', JSON.stringify(todayExercises));
        }

        function saveLockedExercises() {
            localStorage.setItem('lockedExercises', JSON.stringify(lockedExercises));
        }
    </script>
</body>
</html>
